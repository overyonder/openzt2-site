<style>
:root{color-scheme:light;--fg:#3c3836;--muted:#7c6f64;--line:#d5c4a1;--panel:#fbf1c7;--soft:#ebdbb2;--link:#076678;--control:#f2e5bc;--control-border:#a89984;--active:#ebdbb2;--ok:#79740e;--warn:#b57614;--frontier:#8f3f71;--bad:#9d0006}
:root[data-theme="dark"]{color-scheme:dark;--fg:#ebdbb2;--muted:#a89984;--line:#504945;--panel:#282828;--soft:#3c3836;--link:#83a598;--control:#3c3836;--control-border:#665c54;--active:#504945;--ok:#98971a;--warn:#d79921;--frontier:#b16286;--bad:#cc241d}
*{box-sizing:border-box}html,body{background:var(--panel);color:var(--fg);overscroll-behavior:none}body{margin:0;font:14px/1.5 system-ui,sans-serif}a{color:var(--link)}
button,input,select{background:var(--control);color:var(--fg);border:1px solid var(--control-border);border-radius:4px;padding:3px 7px;font-size:12px}button{cursor:pointer}
.tabs{box-sizing:border-box;display:grid;grid-template-columns:repeat(4,minmax(0,1fr)) 34px 26px;gap:5px;width:min(calc(100vw - 24px),1000px);margin:5px auto 6px;font:12px/1.05 system-ui,sans-serif}.tabs a{display:flex;align-items:center;justify-content:center;min-height:24px;padding:2px 6px;text-align:center;white-space:nowrap;color:var(--fg);text-decoration:none;border:1px solid var(--control-border);border-radius:4px;background:var(--panel)}.tabs a.active{background:var(--active);outline:2px solid currentColor;outline-offset:1px}
.tabs a.gstart{margin-left:9px;position:relative}.tabs a.gstart::before{content:"";position:absolute;left:-5px;top:2px;bottom:2px;border-left:1px solid var(--control-border)}
.nav-icon{display:none}.theme-toggle{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:var(--control);color:var(--fg);border:1px solid var(--control-border);border-radius:4px;padding:0;font:15px/1 system-ui,sans-serif;cursor:pointer}
main{max-width:1180px;margin:0 auto;padding:8px 20px 60px}h1{font-size:24px;margin:10px 0 2px}.sub{color:var(--muted);margin:0 0 16px}
.progress-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:14px 0 18px}
.progress-card{border:1px solid var(--line);border-radius:5px;background:color-mix(in srgb,var(--soft) 55%,transparent);padding:10px 12px}.progress-card h3{margin:0 0 7px;font-size:15px}.progress-card h3 a{text-decoration:none}
.progress-card.primary{grid-column:1/-1}
.stacked-bar{display:flex;width:100%;height:28px;overflow:hidden;border:1px solid var(--control-border);border-radius:4px;background:var(--panel)}
.seg{display:flex;align-items:center;justify-content:center;min-width:2px;color:#fbf1c7;font:700 11px/1 system-ui,sans-serif;white-space:nowrap}.seg-accepted,.seg-known,.seg-named,.seg-all{background:#79740e}.seg-candidate,.seg-some{background:#b57614}.seg-open,.seg-unnamed,.seg-none{background:#9d0006}.seg-mid,.seg-type{background:#076678}.seg-support{background:#7c6f64}.mini-label{margin:8px 0 3px;font-size:12px;color:var(--muted)}
.seg-brief{background:#b57614}.seg-active{background:#8f3f71}.seg-implemented{background:#076678}.seg-verified,.seg-complete{background:#79740e}.seg-blocked{background:#9d0006}
.seg-done{background:#79740e}.seg-not-done{background:#8f3f71}
.legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:3px 12px;margin:7px 0 0;font-size:12px;color:var(--muted)}.legend-row{display:flex;align-items:center;gap:6px}.swatch{width:10px;height:10px;border-radius:2px;display:inline-block;flex:0 0 auto}.progress-note{font-size:12.5px;color:var(--muted);margin:8px 0 0!important}
h2{font-size:17px;margin:26px 0 6px;border-bottom:1px solid var(--line);padding-bottom:3px}
.legalrow{margin:22px 0 0;border-top:1px solid var(--line);padding-top:12px;color:var(--muted);font-size:12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.legalrow button{font-size:12px}
.modal[hidden]{display:none}.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:60}
.modal-box{background:var(--panel);width:min(92vw,1000px);height:min(88vh,900px);border:1px solid var(--line);border-radius:6px;display:flex;flex-direction:column}
.modal-box header{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--line)}
.modal-box iframe{flex:1;border:0;width:100%}
@media(min-width:881px){.tabs{grid-template-columns:minmax(72px,.8fr) minmax(110px,1fr) minmax(96px,.9fr) minmax(220px,1.6fr) 34px 26px;width:min(calc(100vw - 24px),1000px)}}@media(max-width:880px){body{padding-bottom:62px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:50;grid-template-columns:repeat(6,minmax(0,1fr));width:100%;margin:0;padding:6px 8px;background:var(--panel);border-top:1px solid var(--control-border);font:11px/1 system-ui,sans-serif}.tabs a{min-height:48px;padding:0;white-space:normal;border-radius:4px;min-width:0}.tabs a.gstart{margin-left:0}.tabs a.gstart::before{display:none}.nav-icon{display:block;font:22px/1 system-ui,sans-serif}.nav-label{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}.theme-toggle,.reload-toggle{width:48px;height:48px;font-size:22px}main{padding:8px 10px 74px}.progress-grid{grid-template-columns:1fr}.seg{font-size:10px}}
</style>

<body>
<nav class="tabs" aria-label="OpenZT2"><a class="site-brand" href="/">OpenZT2</a><a class="active" href="/"><span class="nav-icon" aria-hidden="true">▣</span><span class="nav-label">Dashboard</span></a><a href="zt-disk-map"><span class="nav-icon" aria-hidden="true">▦</span><span class="nav-label">Byte Range Map</span></a><a href="perimeter"><span class="nav-icon" aria-hidden="true">▤</span><span class="nav-label">Binary Perimeter</span></a><a href="functional-specification"><span class="nav-icon" aria-hidden="true">◇</span><span class="nav-label">Functional Specification</span></a><a class="site-company" href="https://over-yonder.tech/">over|yonder ↗</a></nav>
<main>
 <h1>OpenZT2</h1>
 <p class="sub">Reconstruction progress from the original binary to the native Bevy game.</p>

 <div class="progress-grid" id="progress-bars" aria-label="Project progress summary"></div>

 <div class="legalrow"><button type="button" id="legal-open">Historical legal archive</button></div>
</main>
<div class="modal" id="legal-modal" hidden>
 <div class="modal-box">
  <header><strong>Historical Clean-Room Legal Analysis</strong><button type="button" id="legal-close">Close</button></header>
  <iframe class="legal-frame" src="clean-room-legal-roadmap" title="Historical clean-room legal analysis"></iframe>
 </div>
</div>
<script>
(()=>{const key="zt2-theme";const root=document.documentElement;const stored=()=>{try{return localStorage.getItem(key)}catch(_){return null}};const save=t=>{try{localStorage.setItem(key,t)}catch(_){}};const syncFrames=t=>{for(const f of document.querySelectorAll("iframe.legal-frame")){try{if(f.contentDocument)f.contentDocument.documentElement.dataset.theme=t}catch(_){}}};const apply=(t,p=false)=>{root.dataset.theme=t;if(p)save(t);const b=document.querySelector(".theme-toggle");if(b){b.textContent=t==="dark"?"☀":"☾";b.title="Toggle theme"}syncFrames(t)};apply(stored()==="light"?"light":"dark");window.addEventListener("DOMContentLoaded",()=>{const b=document.createElement("button");b.type="button";b.className="theme-toggle";b.onclick=()=>apply(root.dataset.theme==="dark"?"light":"dark",true);document.querySelector(".tabs").append(b);for(const f of document.querySelectorAll("iframe.legal-frame"))f.addEventListener("load",()=>syncFrames(root.dataset.theme||"dark"));apply(root.dataset.theme||"dark")})})();
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
async function text(urls){let last;for(const u of urls){try{const r=await fetch(u);if(r.ok)return await r.text();last=u+": "+r.status}catch(e){last=e.message}}throw new Error(last)}
function pct(n,total){return total?`${(100*n/total).toFixed(1)}%`:"0.0%"}
function seg(cls,n,total,label){return n?`<div class="seg ${cls}" style="width:${100*n/(total||1)}%" title="${esc(label)}">${pct(n,total)}</div>`:""}
function legend(cls,label){return `<div class="legend-row"><span class="swatch ${cls}"></span>${esc(label)}</div>`}
(()=>{const m=document.getElementById("legal-modal");document.getElementById("legal-open").onclick=()=>m.hidden=false;document.getElementById("legal-close").onclick=()=>m.hidden=true;m.onclick=e=>{if(e.target===m)m.hidden=true}})();
text(["functional-specification","functional-specification.html"]).then(specText=>{
 const plan=packageProgress(specText);
 const behavior=behaviorProgress(specText);
 document.getElementById("progress-bars").innerHTML=`
  <div class="progress-card primary">
   <h3>Project timeline</h3>
   <div class="timeline-stages">
    <a class="timeline-stage complete" href="zt-disk-map"><span>1</span><strong>Unpacking &amp; decompilation</strong><small>Complete</small></a>
    <a class="timeline-stage complete" href="zt-disk-map"><span>2</span><strong>Binary mapping &amp; analysis</strong><small>Complete</small></a>
    <a class="timeline-stage complete" href="perimeter"><span>3</span><strong>Perimeter review &amp; reverse engineering</strong><small>Complete</small></a>
    <a class="timeline-stage complete" href="functional-specification"><span>4</span><strong>Functional specification</strong><small>Established</small></a>
   <a class="timeline-stage active" href="functional-specification#implementation-packages"><span>5</span><strong>Bevy implementation</strong><small>Active</small></a>
   </div>
   <h3>Behavior contracts</h3>
   <div class="stacked-bar" role="img" aria-label="${esc(behavior.aria)}">${behavior.segments}</div>
   <div class="legend">${behavior.legend}</div>
   <p class="progress-note">${behavior.note}</p>
   <h3>Package acceptance</h3>
   <div class="stacked-bar" role="img" aria-label="${esc(plan.aria)}">${plan.segments}</div>
   <div class="legend">${plan.legend}</div>
   <p class="progress-note">${plan.note}</p>
  </div>`;
}).catch(e=>{document.getElementById("progress-bars").insertAdjacentHTML("afterend",`<p class="sub">Failed to load progress data: ${esc(e.message)}</p>`)});
function behaviorProgress(source){
 const doc=new DOMParser().parseFromString(source,"text/html");
 const meter=doc.querySelector(".behavior-progress");
 if(!meter)throw new Error("Behavior progress meter is missing");
 const order=[["done","Done"],["not-done","Not done"],["blocked","Blocked"]];
 const counts=Object.fromEntries(order.map(([status])=>[status,Number(meter.dataset[status]||0)]));
 const total=Number(meter.dataset.total||Object.values(counts).reduce((a,n)=>a+n,0));
 return {
  aria:order.map(([s])=>`${s} ${counts[s]}`).join(", "),
  segments:order.map(([s,l])=>seg(`seg-${s}`,counts[s],total,`${l}: ${counts[s]}`)).join(""),
  legend:order.map(([s,l])=>legend(`seg-${s}`,`${l}: ${counts[s].toLocaleString()}`)).join(""),
  note:`${counts.done.toLocaleString()} of ${total.toLocaleString()} recovered behavior contracts are done.`
 };
}
function packageProgress(source){
 const order=[["brief","Brief ready"],["active","Active"],["implemented","Implemented"],["complete","Complete"],["verified","Verified"],["blocked","Blocked"]];
 const counts=Object.fromEntries(order.map(([s])=>[s,0]));
 const doc=new DOMParser().parseFromString(source,"text/html");
 for(const card of doc.querySelectorAll(".package-card"))for(const [status] of order)if(card.classList.contains(`package-status-${status}`))counts[status]++;
 const total=Object.values(counts).reduce((a,n)=>a+n,0);
 return {
  aria:order.filter(([s])=>counts[s]).map(([s])=>`${s} ${counts[s]}`).join(", "),
  segments:order.map(([s,l])=>seg(`seg-${s}`,counts[s],total,`${l}: ${counts[s]}`)).join(""),
  legend:order.filter(([s])=>counts[s]).map(([s,l])=>legend(`seg-${s}`,`${l}: ${counts[s].toLocaleString()}`)).join(""),
  note:`${(counts.complete+counts.verified).toLocaleString()} of ${total.toLocaleString()} packages are complete.`
 };
}
</script>
</html>
