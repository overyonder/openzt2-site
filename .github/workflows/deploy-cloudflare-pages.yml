name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard public search metadata
        run: |
          pages=(index.html zt-disk-map.html perimeter.html asset-lineage.html functional-specification.html clean-room-legal-roadmap.html)
          for page in "${pages[@]}"; do
            if grep -Eqi '<meta[^>]+name="robots"[^>]+noindex' "$page"; then
              echo "$page must remain indexable" >&2
              exit 1
            fi
            grep -Eqi '<meta[^>]+name="description"[^>]+content=' "$page" || {
              echo "$page is missing its public description" >&2
              exit 1
            }
            grep -Eqi '<link[^>]+rel="canonical"' "$page" || {
              echo "$page is missing its canonical URL" >&2
              exit 1
            }
          done
      - name: Prepare static site
        run: |
          mkdir .pages-output
          rsync -a \
            --exclude .git \
            --exclude .pages-output \
            --exclude CNAME \
            --exclude zt-byte-range-map.tsv \
            ./ .pages-output/
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .pages-output --project-name=openzt2 --branch=main
